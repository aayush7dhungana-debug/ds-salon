<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DS Salon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#171615">
<style>
  :root{
    --ink:#171615;
    --ink-2:#211f1d;
    --ink-3:#2b2825;
    --paper:#F3EEE4;
    --brass:#C0954A;
    --brass-light:#e0b877;
    --red:#9A3B3B;
    --steel:#33506b;
    --green:#4C6B4F;
    --muted:#a39a8c;
    --line:#3a352f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; background:#0c0b0a; }
  body{
    font-family:'Libre Franklin', sans-serif; color:var(--paper);
    min-height:100vh; display:flex; justify-content:center;
    padding:0; 
  }
  h1,h2,h3,.display{ font-family:'Bebas Neue', sans-serif; letter-spacing:0.03em; font-weight:400; }

  #phone{
    width:100%; max-width:460px; min-height:100vh;
    background:var(--ink);
    box-shadow:0 0 60px rgba(0,0,0,0.6);
    position:relative;
    display:flex; flex-direction:column;
  }
  @media(min-width:500px){
    body{ padding:24px 0; }
    #phone{ min-height:calc(100vh - 48px); border-radius:28px; overflow:hidden; border:1px solid #000; }
  }

  .pole-stripe{ height:6px; flex-shrink:0; background:repeating-linear-gradient(-45deg,var(--red) 0 12px,var(--paper) 12px 24px,var(--steel) 24px 36px); }

  header.hero{ padding:22px 20px 16px; text-align:center; background:linear-gradient(180deg,var(--ink-3),var(--ink-2)); border-bottom:1px solid var(--line); }
  .logo-wrap{ width:64px; height:64px; margin:0 auto 8px; border-radius:18px; overflow:hidden; background:var(--ink-3); display:flex; align-items:center; justify-content:center; border:1px solid var(--line); }
  .logo-wrap img{ width:100%; height:100%; object-fit:cover; }
  .logo-fallback{ font-size:1.8rem; }
  header.hero h1{ font-size:2.1rem; margin:0; color:var(--brass-light); }
  header.hero p{ margin:4px 0 0; color:var(--muted); font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; }

  nav.tabs{ display:flex; gap:2px; background:var(--ink-2); padding:0 8px; flex-shrink:0; }
  nav.tabs button{ flex:1; padding:13px 6px; background:transparent; border:none; border-bottom:3px solid transparent; color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:0.05em; cursor:pointer; }
  nav.tabs button.active{ color:var(--paper); border-bottom-color:var(--brass); }

  main{ padding:18px 16px 8px; flex:1; }
  .section-title{ font-size:1.35rem; color:var(--brass-light); margin:0 0 3px; }
  .section-sub{ color:var(--muted); margin:0 0 14px; font-size:0.85rem; }

  /* barber row */
  .barber-scroll{ display:flex; gap:10px; overflow-x:auto; padding:2px 2px 14px; margin-bottom:4px; }
  .barber-chip{ flex:0 0 auto; width:84px; text-align:center; cursor:pointer; padding:8px 6px 6px; border-radius:14px; border:2px solid transparent; background:var(--ink-2); }
  .barber-chip.selected{ border-color:var(--brass); background:var(--ink-3); }
  .b-avatar{ width:52px; height:52px; border-radius:50%; object-fit:cover; margin:0 auto; display:block; background:#5a5449; }
  .b-avatar-fallback{ width:52px; height:52px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; background:#5a5449; font-size:1.4rem; }
  .barber-chip .b-name{ font-size:0.78rem; margin-top:5px; color:var(--paper); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .b-phone-link{ font-size:0.68rem; color:var(--brass-light); text-decoration:none; }

  /* services grid */
  .svc-grid{ display:flex; flex-direction:column; gap:9px; margin-bottom:16px; }
  .svc-item{ display:flex; justify-content:space-between; align-items:center; background:var(--paper); color:var(--ink); border-radius:12px; padding:13px 15px; border:2px solid transparent; cursor:pointer; opacity:1; }
  .svc-item.disabled{ opacity:0.32; filter:grayscale(0.4); cursor:not-allowed; background:#c9c2b5; }
  .svc-item.selected{ border-color:var(--brass); box-shadow:0 0 0 2px var(--brass) inset; }
  .svc-item .s-name{ font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:0.02em; }
  .svc-item .s-price{ font-weight:700; color:var(--red); }
  .svc-check{ width:20px; height:20px; border-radius:50%; border:2px solid #857c6c; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.75rem; }
  .svc-item.selected .svc-check{ background:var(--brass); border-color:var(--brass); color:var(--ink); }
  .svc-row-left{ display:flex; align-items:center; gap:10px; }

  .btn{ display:inline-block; width:100%; margin-top:6px; padding:14px 20px; border-radius:12px; border:none; background:var(--brass); color:var(--ink); font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:0.04em; cursor:pointer; text-align:center; }
  .btn.secondary{ background:transparent; border:1px solid var(--brass); color:var(--brass-light); }
  .btn.danger{ background:var(--red); color:var(--paper); }
  .btn.small{ padding:7px 14px; font-size:0.9rem; margin-top:0; width:auto; }
  .btn.link{ background:none; border:none; color:var(--brass-light); text-decoration:underline; width:auto; padding:0; font-family:inherit; font-size:0.85rem; }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .date-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .date-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; }
  .date-card:hover{ border-color:var(--brass); }
  .date-card .d-day{ font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--brass-light); }
  .date-card .d-count{ font-size:0.72rem; color:var(--muted); margin-top:2px; }

  .time-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .time-btn{ padding:10px 16px; background:var(--ink-2); border:1px solid var(--line); border-radius:20px; color:var(--paper); cursor:pointer; font-size:0.92rem; }
  .time-btn:hover{ border-color:var(--brass); }

  .assign-banner{ background:var(--ink-3); border:1px solid var(--brass); border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:0.88rem; }
  .assign-banner strong{ color:var(--brass-light); }

  label{ display:block; font-size:0.8rem; color:var(--muted); margin-bottom:4px; margin-top:12px; }
  input[type=text], input[type=tel], input[type=password], input[type=date], input[type=time], input[type=number], input[type=url]{
    width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--line); background:var(--ink-2); color:var(--paper); font-size:1rem; font-family:inherit;
  }
  .panel{ background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
  .empty{ color:var(--muted); font-style:italic; padding:8px 0; }
  .msg{ padding:11px 13px; border-radius:10px; margin-bottom:14px; font-size:0.88rem; }
  .msg.ok{ background:#213424; color:#bfe3c6; border:1px solid var(--green); }
  .msg.err{ background:#352222; color:#e3bfbf; border:1px solid var(--red); }

  .summary-line{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--line); font-size:0.9rem; }
  .summary-line:last-of-type{ border-bottom:none; }
  .summary-total{ display:flex; justify-content:space-between; padding-top:10px; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--brass-light); }
  .note-box{ background:#26221c; border:1px solid var(--brass); border-radius:10px; padding:11px 13px; font-size:0.8rem; color:var(--brass-light); margin:14px 0; }

  /* swipe to confirm */
  .swipe-track{ position:relative; height:56px; background:var(--ink-3); border:1px solid var(--line); border-radius:28px; margin-top:16px; overflow:hidden; touch-action:none; }
  .swipe-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.9rem; letter-spacing:0.05em; pointer-events:none; }
  .swipe-thumb{ position:absolute; top:3px; left:3px; width:50px; height:50px; border-radius:50%; background:var(--brass); color:var(--ink); display:flex; align-items:center; justify-content:center; font-size:1.3rem; cursor:grab; touch-action:none; user-select:none; }

  .row-item{ background:var(--ink-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .row-item .meta{ font-size:0.82rem; color:var(--muted); }
  .status-pill{ font-size:0.7rem; padding:3px 10px; border-radius:12px; text-transform:uppercase; letter-spacing:0.05em; }
  .status-pending{ background:#5a4b1f; color:#e0c878; }
  .status-approved{ background:var(--green); color:#dcefe0; }
  .status-rejected{ background:var(--red); color:#f0d8d8; }
  .status-active{ background:var(--green); color:#dcefe0; }
  .status-inactive{ background:#4a463f; color:#c9c2b6; }

  .login-tabs{ display:flex; gap:8px; margin-bottom:16px; }
  .login-tabs button{ flex:1; padding:10px; border-radius:10px; border:1px solid var(--line); background:var(--ink-2); color:var(--muted); cursor:pointer; font-family:'Bebas Neue',sans-serif; letter-spacing:0.04em; font-size:1rem; }
  .login-tabs button.active{ background:var(--brass); color:var(--ink); border-color:var(--brass); }

  .inline-form{ display:flex; gap:8px; flex-wrap:wrap; align-items:end; margin-top:10px; }
  .inline-form > div{ flex:1; min-width:120px; }

  .barber-row-avatar{ width:44px; height:44px; border-radius:50%; object-fit:cover; background:#5a5449; }
  .barber-row-left{ display:flex; align-items:center; gap:12px; }

  .chip-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .svc-chip{ padding:7px 12px; border-radius:16px; border:1px solid var(--line); background:var(--ink); font-size:0.82rem; cursor:pointer; color:var(--muted); }
  .svc-chip.on{ background:var(--brass); color:var(--ink); border-color:var(--brass); font-weight:600; }

  footer.contact{ padding:18px 16px 10px; border-top:1px solid var(--line); background:var(--ink-2); font-size:0.82rem; }
  footer.contact .addr{ color:var(--muted); margin-bottom:8px; }
  footer.contact .socials{ display:flex; flex-wrap:wrap; gap:8px; }
  footer.contact a.social-btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:20px; background:var(--ink-3); border:1px solid var(--line); color:var(--paper); text-decoration:none; font-size:0.82rem; }
  footer.contact a.social-btn:hover{ border-color:var(--brass); }
  footer.note{ text-align:center; color:var(--muted); font-size:0.72rem; padding:14px; }
</style>
</head>
<body>
<div id="phone">
  <div id="app"></div>
</div>

<script>
const STORAGE_KEY = 'ds-salon-data-v3';
let state = null;
let ui = {
  view: 'customer',
  cust: { barberId:null, selectedServiceIds:[], phase:'pick', chosenDate:null, assignments:[], msg:null, showStatus:false },
  statusCheck: { phone:'', results:null },
  staffRole: 'owner',
  loginForm: { username:'', password:'', err:null },
  session: null,
  ownerTab: 'barbers',
  barberTab: 'requests',
  editingBarberId: null,
  editDraft: {},
  msg:null
};
let swipe = { dragging:false, startX:0, trackWidth:0, triggered:false };

function id(){ return Math.random().toString(36).slice(2,10); }

function defaultData(){
  const svc1=id(), svc2=id(), svc3=id();
  const barber = (idx, offered) => ({
    id:'barber'+idx, name:'Barber '+idx, photoUrl:'', phone:'', active:true,
    username:'barber'+idx, password:'123450', slots:[], serviceIds: offered
  });
  return {
    shopName:'DS Salon',
    shopInfo:{ logoUrl:'', address:'', phone:'', socialLinks:[] },
    mainAdmin:{ username:'admin', password:'123450' },
    services:[
      {id:svc1, name:'Haircut', price:150},
      {id:svc2, name:'Beard Trim', price:80},
      {id:svc3, name:'Haircut + Beard', price:210}
    ],
    barbers:[ barber(1,[svc1,svc2,svc3]), barber(2,[svc1,svc2,svc3]), barber(3,[svc1,svc2,svc3]) ],
    bookings:[]
  };
}

function isValidData(d){
  return d && d.mainAdmin && d.shopInfo && Array.isArray(d.services) && Array.isArray(d.barbers) && Array.isArray(d.bookings);
}

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = JSON.parse(raw);
    state = isValidData(parsed) ? parsed : defaultData();
  }catch(e){
    state = defaultData();
    await saveData();
  }
  render();
}
async function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('save failed', e); }
}

function getBarber(bid){ return state.barbers.find(b=>b.id===bid); }
function getService(sid){ return state.services.find(s=>s.id===sid); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatDate(d){ try{ const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'}); }catch(e){ return d; } }
function formatDateShort(d){ try{ const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString(undefined,{weekday:'short', day:'numeric', month:'short'}); }catch(e){ return d; } }

function avatarHtml(b, cls){
  if(b.photoUrl){
    return `<img class="${cls}" src="${escapeHtml(b.photoUrl)}" onerror="this.outerHTML='<div class=\\'${cls}-fallback\\'>&#9986;&#65039;</div>'">`;
  }
  return `<div class="${cls}-fallback" style="display:flex;align-items:center;justify-content:center;">&#9986;&#65039;</div>`;
}

function socialIcon(label){
  const l = label.toLowerCase();
  if(l.includes('facebook')) return '📘';
  if(l.includes('instagram')) return '📷';
  if(l.includes('tiktok')) return '🎵';
  if(l.includes('whatsapp')) return '💬';
  if(l.includes('youtube')) return '▶️';
  return '🔗';
}

// ---------- root render ----------
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="pole-stripe"></div>
    <header class="hero">
      <div class="logo-wrap">${state.shopInfo.logoUrl ? `<img src="${escapeHtml(state.shopInfo.logoUrl)}" onerror="this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>&#9986;&#65039;</div>'">` : `<div class="logo-fallback">&#9986;&#65039;</div>`}</div>
      <h1>${escapeHtml(state.shopName)}</h1>
      <p>Book your chair — no fuss, no payment</p>
    </header>
    <nav class="tabs">
      <button data-action="switch-view" data-id="customer" class="${ui.view==='customer'?'active':''}">Book</button>
      <button data-action="switch-view" data-id="staff" class="${ui.view==='staff'?'active':''}">Staff</button>
    </nav>
    <main>
      ${ui.view==='customer' ? renderCustomer() : renderStaff()}
    </main>
    ${renderFooter()}
  `;
  setupSwipe();
}

function renderFooter(){
  const info = state.shopInfo;
  const hasAny = info.address || info.phone || (info.socialLinks && info.socialLinks.length);
  if(!hasAny) return `<footer class="note">${escapeHtml(state.shopName)}</footer>`;
  let html = `<footer class="contact">`;
  if(info.address) html += `<div class="addr">📍 ${escapeHtml(info.address)}</div>`;
  if(info.phone) html += `<div class="addr">☎️ <a href="tel:${escapeHtml(info.phone)}" style="color:var(--brass-light); text-decoration:none;">${escapeHtml(info.phone)}</a></div>`;
  if(info.socialLinks && info.socialLinks.length){
    html += `<div class="socials">`;
    info.socialLinks.forEach(s=>{
      html += `<a class="social-btn" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${socialIcon(s.label)} ${escapeHtml(s.label)}</a>`;
    });
    html += `</div>`;
  }
  html += `</footer>`;
  return html;
}

// ---------- CUSTOMER ----------
function renderCustomer(){
  const c = ui.cust;
  let html = '';
  if(c.msg){ html += `<div class="msg ${c.msg.type}">${escapeHtml(c.msg.text)}</div>`; }

  if(c.phase==='pick') html += renderPick();
  else if(c.phase==='dates') html += renderDates();
  else if(c.phase==='times') html += renderTimes();
  else if(c.phase==='confirm') html += renderConfirm();

  return html;
}

function renderPick(){
  const c = ui.cust;
  const activeBarbers = state.barbers.filter(b=>b.active);
  const b = c.barberId ? getBarber(c.barberId) : null;

  let html = `<div class="section-title">Choose your barber</div>
    <div class="barber-scroll">`;
  if(activeBarbers.length===0){ html += `<div class="empty">No barbers available right now.</div>`; }
  activeBarbers.forEach(bb=>{
    html += `<div class="barber-chip ${c.barberId===bb.id?'selected':''}" data-action="cust-pick-barber" data-id="${bb.id}">
      ${avatarHtml(bb,'b-avatar')}
      <div class="b-name">${escapeHtml(bb.name)}</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="section-title" style="margin-top:6px;">Choose service(s)</div>
    <div class="section-sub">${b ? 'Available with '+escapeHtml(b.name) : 'Pick a barber above to see what they offer'}</div>
    <div class="svc-grid">`;
  if(state.services.length===0){ html += `<div class="empty">No services set up yet.</div>`; }
  state.services.forEach(s=>{
    const offered = b && b.serviceIds && b.serviceIds.includes(s.id);
    const selected = c.selectedServiceIds.includes(s.id);
    html += `<div class="svc-item ${offered?'':'disabled'} ${selected?'selected':''}" ${offered?`data-action="cust-toggle-service" data-id="${s.id}"`:''}>
      <div class="svc-row-left">
        <div class="svc-check">${selected?'✓':''}</div>
        <div class="s-name">${escapeHtml(s.name)}</div>
      </div>
      <div class="s-price">${s.price} kr</div>
    </div>`;
  });
  html += `</div>`;

  if(b && c.selectedServiceIds.length>0){
    html += `<button class="btn" data-action="cust-check-slots">Check Available Slots (${c.selectedServiceIds.length} service${c.selectedServiceIds.length>1?'s':''})</button>`;
  }

  html += `<div style="margin-top:20px;">
    <button class="btn link" data-action="toggle-status">${c.showStatus?'Hide':'Already booked? Check your appointment'}</button>
  </div>`;
  if(c.showStatus){ html += renderStatusCheck(); }
  return html;
}

function renderStatusCheck(){
  let html = `<div class="panel" style="margin-top:12px;">
    <label>Phone number</label>
    <div style="display:flex; gap:8px;">
      <input type="tel" id="status-phone" value="${escapeHtml(ui.statusCheck.phone)}" placeholder="Enter the phone you booked with">
      <button class="btn small" data-action="check-status" style="flex-shrink:0;">Check</button>
    </div>`;
  if(ui.statusCheck.results){
    if(ui.statusCheck.results.length===0){ html += `<div class="empty">No appointments found for that number.</div>`; }
    else{
      ui.statusCheck.results.forEach(r=>{
        html += `<div class="row-item">
          <div><div>${escapeHtml(r.barberName)} &middot; ${escapeHtml(r.serviceName)}</div>
          <div class="meta">${escapeHtml(formatDate(r.date))} at ${escapeHtml(r.time)}</div></div>
          <span class="status-pill status-${r.status}">${r.status}</span>
        </div>`;
      });
    }
  }
  html += `</div>`;
  return html;
}

function renderDates(){
  const c = ui.cust;
  const b = getBarber(c.barberId);
  const openSlots = b.slots.filter(sl=>!sl.booked);
  const byDate = {};
  openSlots.forEach(sl=>{ (byDate[sl.date] = byDate[sl.date]||[]).push(sl); });
  const dates = Object.keys(byDate).sort();

  let html = `<button class="btn link" data-action="cust-back-to-pick">&larr; Change barber / services</button>
    <div class="section-title" style="margin-top:12px;">Choose a date</div>
    <div class="section-sub">${escapeHtml(b.name)} &middot; ${c.selectedServiceIds.length} service${c.selectedServiceIds.length>1?'s':''} selected</div>
    <div class="date-grid">`;
  if(dates.length===0){ html += `<div class="empty">No open slots right now — check back soon.</div>`; }
  dates.forEach(d=>{
    html += `<div class="date-card" data-action="cust-pick-date" data-id="${escapeHtml(d)}">
      <div class="d-day">${escapeHtml(formatDateShort(d))}</div>
      <div class="d-count">${byDate[d].length} time${byDate[d].length>1?'s':''} open</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderTimes(){
  const c = ui.cust;
  const b = getBarber(c.barberId);
  const serviceIdx = c.assignments.length;
  const currentServiceId = c.selectedServiceIds[serviceIdx];
  const currentService = getService(currentServiceId);
  const usedSlotIds = c.assignments.map(a=>a.slotId);
  const available = b.slots.filter(sl=> sl.date===c.chosenDate && !sl.booked && !usedSlotIds.includes(sl.id))
    .sort((a,d)=>a.time.localeCompare(d.time));

  let html = `<button class="btn link" data-action="cust-back-to-dates">&larr; Choose a different date</button>
    <div class="assign-banner">Selecting time for: <strong>${escapeHtml(currentService?currentService.name:'')}</strong> &middot; service ${serviceIdx+1} of ${c.selectedServiceIds.length}</div>
    <div class="section-title">${escapeHtml(formatDate(c.chosenDate))}</div>
    <div class="time-grid">`;

// ---------- swipe control ----------
function setupSwipe(){
  swipe.triggered = false;
  const track = document.getElementById('swipe-track');
  const thumb = document.getElementById('swipe-thumb');
  if(!track || !thumb) return;
  thumb.style.transform = 'translateX(0px)';
}

document.addEventListener('pointerdown', (e)=>{
  const thumb = e.target.closest('#swipe-thumb');
  if(!thumb) return;
  const track = document.getElementById('swipe-track');
  swipe.dragging = true;
  swipe.startX = e.clientX;
  swipe.trackWidth = track.offsetWidth - thumb.offsetWidth - 6;
  try{ thumb.setPointerCapture(e.pointerId); }catch(err){}
});
document.addEventListener('pointermove', (e)=>{
  if(!swipe.dragging) return;
  const thumb = document.getElementById('swipe-thumb');
  if(!thumb) return;
  let dx = e.clientX - swipe.startX;
  dx = Math.max(0, Math.min(dx, swipe.trackWidth));
  thumb.style.transform = `translateX(${dx}px)`;
  if(dx >= swipe.trackWidth - 2 && !swipe.triggered){
    swipe.triggered = true;
    swipe.dragging = false;
    doConfirmBooking();
  }
});
document.addEventListener('pointerup', ()=>{
  if(!swipe.dragging) return;
  swipe.dragging = false;
  const thumb = document.getElementById('swipe-thumb');
  if(thumb && !swipe.triggered){ thumb.style.transform = 'translateX(0px)'; }
});

async function doConfirmBooking(){
  const nameEl = document.getElementById('confirm-name');
  const phoneEl = document.getElementById('confirm-phone');
  const name = nameEl ? nameEl.value.trim() : '';
  const phone = phoneEl ? phoneEl.value.trim() : '';
  if(!name || !phone){
    ui.cust.msg = {type:'err', text:'Please enter your name and phone number before confirming.'};
    swipe.triggered = false;
    render();
    return;
  }
  const c = ui.cust;
  const b = getBarber(c.barberId);
  // re-validate slots still open
  for(const a of c.assignments){
    const slot = b.slots.find(s=>s.id===a.slotId);
    if(!slot || slot.booked){
      ui.cust.msg = {type:'err', text:'Sorry, one of your chosen times was just taken. Please pick again.'};
      ui.cust.phase='dates'; ui.cust.assignments=[]; ui.cust.chosenDate=null;
      render();
      return;
    }
  }
  const groupId = id();
  c.assignments.forEach(a=>{
    state.bookings.push({ id:id(), groupId, barberId:b.id, serviceId:a.serviceId, slotId:a.slotId, date:a.date, time:a.time, customerName:name, phone:phone, status:'pending', createdAt:Date.now() });
  });
  await saveData();
  ui.cust = { barberId:null, selectedServiceIds:[], phase:'pick', chosenDate:null, assignments:[], showStatus:false,
    msg:{type:'ok', text:'Request sent! '+b.name+' will confirm your appointment soon. You can check status anytime with your phone number.'} };
  render();
}

// ---------- ACTIONS ----------
document.addEventListener('click', async (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const idv = el.dataset.id;

  if(action==='switch-view'){ ui.view = idv; ui.msg=null; render(); }
  else if(action==='toggle-status'){ ui.cust.showStatus = !ui.cust.showStatus; render(); }

  else if(action==='cust-pick-barber'){
    ui.cust.barberId = (ui.cust.barberId===idv) ? null : idv;
    ui.cust.selectedServiceIds = [];
    render();
  }
  else if(action==='cust-toggle-service'){
    const arr = ui.cust.selectedServiceIds;
    const i = arr.indexOf(idv);
    if(i===-1) arr.push(idv); else arr.splice(i,1);
    render();
  }
  else if(action==='cust-check-slots'){ ui.cust.phase='dates'; render(); }
  else if(action==='cust-back-to-pick'){ ui.cust.phase='pick'; ui.cust.chosenDate=null; ui.cust.assignments=[]; render(); }
  else if(action==='cust-back-to-dates'){ ui.cust.phase='dates'; ui.cust.chosenDate=null; ui.cust.assignments=[]; render(); }
  else if(action==='cust-pick-date'){ ui.cust.chosenDate = idv; ui.cust.assignments=[]; ui.cust.phase='times'; render(); }
  else if(action==='cust-pick-time'){
    const c = ui.cust;
    const b = getBarber(c.barberId);
    const slot = b.slots.find(s=>s.id===idv);
    if(!slot) return;
    const serviceId = c.selectedServiceIds[c.assignments.length];
    c.assignments.push({ serviceId, slotId: slot.id, date: slot.date, time: slot.time });
    if(c.assignments.length >= c.selectedServiceIds.length){ c.phase='confirm'; }
    render();
  }

  else if(action==='check-status'){
    const phone = document.getElementById('status-phone').value.trim();
    ui.statusCheck.phone = phone;
    ui.statusCheck.results = state.bookings.filter(bk=>bk.phone===phone).map(bk=>{
      const b = getBarber(bk.barberId); const svc = getService(bk.serviceId);
      return { barberName: b?b.name:'Unknown', serviceName: svc?svc.name:'Unknown', date:bk.date, time:bk.time, status:bk.status };
    });
    render();
  }

  else if(action==='pick-role'){ ui.staffRole = idv; ui.loginForm={username:'',password:'',err:null}; render(); }

  else if(action==='do-login'){
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    if(ui.staffRole==='owner'){
      if(state.mainAdmin.username===u && state.mainAdmin.password===p){
        ui.session={role:'owner'}; ui.ownerTab='barbers'; ui.msg=null; ui.loginForm={username:'',password:'',err:null};
      }else{ ui.loginForm.err='Incorrect username or password.'; }
    }else{
      const b = state.barbers.find(x=>x.username===u && x.password===p);
      if(!b){ ui.loginForm.err='Incorrect username or password.'; }
      else if(!b.active){ ui.loginForm.err='This account is currently inactive. Contact the salon owner.'; }
      else{ ui.session={role:'barber', barberId:b.id}; ui.barberTab='requests'; ui.msg=null; ui.loginForm={username:'',password:'',err:null}; }
    }
    render();
  }

  else if(action==='logout'){ ui.session=null; ui.msg=null; ui.editingBarberId=null; render(); }
  else if(action==='owner-tab'){ ui.ownerTab = idv; ui.msg=null; ui.editingBarberId=null; render(); }
  else if(action==='barber-tab'){ ui.barberTab = idv; ui.msg=null; render(); }

  else if(action==='approve-booking'){
    const bk = state.bookings.find(x=>x.id===idv);
    if(bk){
      bk.status='approved';
      const b = getBarber(bk.barberId);
      const slot = b ? b.slots.find(s=>s.id===bk.slotId) : null;
      if(slot) slot.booked = true;
      state.bookings.forEach(other=>{ if(other.id!==bk.id && other.slotId===bk.slotId && other.status==='pending'){ other.status='rejected'; } });
      await saveData(); ui.msg={type:'ok', text:'Appointment confirmed.'}; render();
    }
  }
  else if(action==='reject-booking'){
    const bk = state.bookings.find(x=>x.id===idv);
    if(bk){ bk.status='rejected'; await saveData(); ui.msg={type:'ok', text:'Request declined.'}; render(); }
  }
  else if(action==='remove-slot'){
    const b = getBarber(ui.session.barberId);
    b.slots = b.slots.filter(s=>s.id!==idv);
    await saveData(); render();
  }
  else if(action==='add-slot'){
    const b = getBarber(ui.session.barberId);
    const date = document.getElementById('new-slot-date').value;
    const time = document.getElementById('new-slot-time').value;
    if(!date || !time){ ui.msg={type:'err', text:'Pick both a date and a time.'}; render(); return; }
    b.slots.push({id:id(), date, time, booked:false});
    await saveData(); ui.msg={type:'ok', text:'Slot added.'}; render();
  }

  // owner: barbers
  else if(action==='toggle-barber-active'){
    const b = getBarber(idv); b.active = !b.active; await saveData(); render();
  }
  else if(action==='edit-barber'){
    const b = getBarber(idv);
    ui.editingBarberId = idv;
    ui.editDraft = { name:b.name, photoUrl:b.photoUrl||'', phone:b.phone||'', username:b.username, serviceIds:[...b.serviceIds] };
    render();
  }
  else if(action==='edit-toggle-service'){
    const arr = ui.editDraft.serviceIds;
    const i = arr.indexOf(idv);
    if(i===-1) arr.push(idv); else arr.splice(i,1);
    render();
  }
  else if(action==='cancel-barber-edit'){ ui.editingBarberId=null; render(); }
  else if(action==='save-barber-edit'){
    const b = getBarber(idv);
    const name = document.getElementById('edit-name').value.trim();
    const photoUrl = document.getElementById('edit-photo').value.trim();
    const phone = document.getElementById('edit-phone').value.trim();
    const username = document.getElementById('edit-username').value.trim();
    const password = document.getElementById('edit-password').value;
    if(!name || !username){ ui.msg={type:'err', text:'Name and username cannot be empty.'}; render(); return; }
    b.name=name; b.photoUrl=photoUrl; b.phone=phone; b.username=username; b.serviceIds=[...ui.editDraft.serviceIds];
    if(password) b.password = password;
    ui.editingBarberId=null;
    await saveData(); ui.msg={type:'ok', text:'Barber profile updated.'}; render();
  }
  else if(action==='remove-barber'){
    state.barbers = state.barbers.filter(b=>b.id!==idv);
    state.bookings = state.bookings.filter(bk=>bk.barberId!==idv);
    await saveData(); ui.msg={type:'ok', text:'Barber removed.'}; render();
  }
  else if(action==='add-barber'){
    const name = document.getElementById('new-barber-name').value.trim();
    const photoUrl = document.getElementById('new-barber-photo').value.trim();
    const phone = document.getElementById('new-barber-phone').value.trim();
    const username = document.getElementById('new-barber-username').value.trim();
    const password = document.getElementById('new-barber-password').value;
    if(!name || !username || !password){ ui.msg={type:'err', text:'Name, username, and password are required.'}; render(); return; }
    if(state.barbers.some(b=>b.username===username)){ ui.msg={type:'err', text:'That username is already taken.'}; render(); return; }
    state.barbers.push({ id:id(), name, photoUrl, phone, active:true, username, password, slots:[], serviceIds: state.services.map(s=>s.id) });
    await saveData(); ui.msg={type:'ok', text:'Barber added.'}; render();
  }

  // owner: services
  else if(action==='remove-service'){
    state.services = state.services.filter(s=>s.id!==idv);
    state.barbers.forEach(b=>{ b.serviceIds = b.serviceIds.filter(sid=>sid!==idv); });
    await saveData(); render();
  }
  else if(action==='edit-service-price'){
    const s = getService(idv);
    const newPrice = prompt('New price (kr) for '+s.name+':', s.price);
    if(newPrice!==null && !isNaN(parseFloat(newPrice))){ s.price = parseFloat(newPrice); await saveData(); render(); }
  }
  else if(action==='edit-service-name'){
    const s = getService(idv);
    const newName = prompt('New name for this service:', s.name);
    if(newName!==null && newName.trim()){ s.name = newName.trim(); await saveData(); render(); }
  }
  else if(action==='add-service'){
    const name = document.getElementById('new-service-name').value.trim();
    const price = parseFloat(document.getElementById('new-service-price').value);
    if(!name || isNaN(price)){ ui.msg={type:'err', text:'Enter a service name and a valid price.'}; render(); return; }
    const newId = id();
    state.services.push({id:newId, name, price});
    state.barbers.forEach(b=>{ b.serviceIds.push(newId); });
    await saveData(); ui.msg={type:'ok', text:'Service added (offered by all barbers by default — edit each barber to change).'}; render();
  }

  // owner: shop info
  else if(action==='save-shop-info'){
    state.shopInfo.logoUrl = document.getElementById('shop-logo').value.trim();
    state.shopInfo.address = document.getElementById('shop-address').value.trim();
    state.shopInfo.phone = document.getElementById('shop-phone').value.trim();
    await saveData(); ui.msg={type:'ok', text:'Shop info saved.'}; render();
  }
  else if(action==='add-social'){
    const label = document.getElementById('new-social-label').value.trim();
    const url = document.getElementById('new-social-url').value.trim();
    if(!label || !url){ ui.msg={type:'err', text:'Enter both a label and a link.'}; render(); return; }
    if(!state.shopInfo.socialLinks) state.shopInfo.socialLinks = [];
    state.shopInfo.socialLinks.push({id:id(), label, url});
    await saveData(); ui.msg={type:'ok', text:'Link added.'}; render();
  }
  else if(action==='remove-social'){
    state.shopInfo.socialLinks = state.shopInfo.socialLinks.filter(s=>s.id!==idv);
    await saveData(); render();
  }

  // owner: account
  else if(action==='save-owner-account'){
    const username = document.getElementById('owner-username').value.trim();
    const password = document.getElementById('owner-password').value;
    if(!username){ ui.msg={type:'err', text:'Username cannot be empty.'}; render(); return; }
    state.mainAdmin.username = username;
    if(password) state.mainAdmin.password = password;
    await saveData(); ui.msg={type:'ok', text:'Account updated.'}; render();
  }
});

loadData();
</script>
</body>
</html>
